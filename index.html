<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Absensi Karyawan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center font-sans p-4">

    <div id="login-section" class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Login Karyawan</h2>
        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Username</label>
                <input type="text" id="username" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="password" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>
            <button type="submit" id="btn-login" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition duration-200">
                Masuk
            </button>
        </form>
    </div>

    <div id="absen-section" class="hidden bg-white p-8 rounded-xl shadow-lg w-full max-w-md text-center">
        <h2 class="text-2xl font-bold text-gray-800 mb-1">Halo, <span id="nama-karyawan" class="text-blue-600">Nama</span>!</h2>
        <p class="text-gray-500 mb-6 text-sm">Pastikan GPS Anda aktif sebelum melakukan absensi.</p>

        <div id="status-box" class="mb-6 p-4 rounded-lg bg-blue-50 text-blue-700 text-sm border border-blue-200">
            Menunggu sistem...
        </div>

        <div class="flex gap-4 mb-4">
            <button id="btn-in" onclick="prosesAbsen('masuk')" disabled 
                class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-3 rounded-lg transition duration-200 opacity-50 cursor-not-allowed">
                Absen Masuk
            </button>
            <button id="btn-out" onclick="prosesAbsen('pulang')" disabled 
                class="w-full bg-red-500 hover:bg-red-600 text-white font-semibold py-3 rounded-lg transition duration-200 opacity-50 cursor-not-allowed">
                Absen Pulang
            </button>
        </div>

        <button onclick="logout()" class="text-sm text-gray-500 hover:text-red-500 underline">Logout Keluar</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
